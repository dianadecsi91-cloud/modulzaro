

    <button  type="button" class="btn btn-light" (click)="Inkr()">Növekvő sorrendbe!</button> <button  type="button" class="btn btn-light" (click)="Dekr()">Csökkenő sorrendbe!</button><button  type="button" class="btn btn-light" (click)="Van()">Elérhető</button>
    <table class="table table-bordered">
        <thead>
            <tr>
            
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
             
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of products">
           <td>{{item.name}}</td>
           <td>{{item.price}} FT</td>
           <td>{{item.quantity}} DB</td>
           <td><button  type="button" class="btn btn-info" (click)="Add()">Kosárba rak!</button></td>
           </tr>
        </tbody>
    </table>
